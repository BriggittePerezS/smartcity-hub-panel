<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity Hub - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); height: 100vh; display: flex; align-items: center; }
        .card-registro { border: none; border-radius: 16px; background-color: #ffffff; }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card card-registro shadow-lg p-4">
                    <div class="text-center mb-4">
                        <span class="fs-1">📝</span>
                        <h3 class="fw-bold text-dark mt-2">Crear Cuenta</h3>
                        <p class="text-muted small">Regístrate como Vecino del municipio</p>
                    </div>

                    {% with mensajes = get_flashed_messages(with_categories=true) %}
                        {% if mensajes %}
                            {% for categoria, mensaje in mensajes %}
                                <div class="alert alert-{{ categoria }} alert-dismissible fade show small py-2 fw-bold" role="alert">
                                    <i class="fa-solid fa-circle-exclamation me-2"></i> {{ mensaje }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    
                    <form action="/registro" method="POST">
                        <div class="mb-3">
                            <label for="usuario" class="form-label fw-bold small text-secondary">Elige un nombre de Usuario</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-user-plus"></i></span>
                                <input type="text" class="form-control" id="usuario" name="web_usuario" placeholder="Ej: vecino_madrid" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="clave" class="form-label fw-bold small text-secondary">Establece tu Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control" id="clave" name="web_clave" placeholder="Mínimo 4 caracteres" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm mb-3">
                            <i class="fa-solid fa-user-check me-2"></i> Registrarse e Ir al Sistema
                        </button>
                    </form>

                    <div class="text-center mt-1">
                        <a href="/login" class="small fw-bold text-secondary text-decoration-none">&larr; Volver al Inicio de Sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
